name: M3U Playlist Filter

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]

env:
  M3U_SOURCE_URL: ${{ secrets.M3U_SOURCE_URL }}
  S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME  }}
  S3_OBJECT_KEY: ${{ secrets.S3_OBJECT_KEY }}
  S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
  S3_REGION: ${{ secrets.S3_REGION }}
  S3_EPG_KEY: ${{ secrets.S3_EPG_KEY }}
  EPG_SOURCE_URL: ${{ secrets.EPG_SOURCE_URL }}
  LOCAL_EPG_PATH: ${{ secrets.LOCAL_EPG_PATH  }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Run tests
      run: go test ./... -v -count=1

  filter-m3u:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    if: github.event_name != 'pull_request' || always()
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Set dry-run mode for pull requests
      if: github.event_name == 'pull_request'
      run: echo "DRY_RUN=true" >> $GITHUB_ENV

    - name: Run M3U filter script
      run: go run ./cmd/iptv-filter/
